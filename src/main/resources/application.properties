spring.application.name=Investment_Tracking
# Datos de conexión
#spring.datasource.url=jdbc:mysql://localhost:3306/invest_db?createDatabaseIfNotExist=true
spring.datasource.url=jdbc:mariadb://localhost:3306/invest_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# Configuración de inicialización
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
logging.level.org.springframework.security=DEBUG

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

spring.jpa.open-in-view=false