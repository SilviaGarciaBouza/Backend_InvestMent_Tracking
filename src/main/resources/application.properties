# CONFIGURACION GENERAL DE LA APLICACION
# Nombre identificativo del microservicio en el ecosistema Spring.
spring.application.name=Investment_Tracking

# PERSISTENCIA Y CONEXION A DATOS (MARIADB)
# URL de conexion. Incluye parametro para crear la base de datos si no existe.
spring.datasource.url=jdbc:mariadb://localhost:3306/invest_db?createDatabaseIfNotExist=true
# Driver especifico para la comunicacion con el motor MariaDB.
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# Credenciales de acceso al servidor de base de datos local.
spring.datasource.username=root
spring.datasource.password=root

# CONFIGURACION DE JPA / HIBERNATE
# Modo de inicializacion: 'always' asegura que se ejecuten scripts de carga si existen.
spring.sql.init.mode=always
# Sincroniza el modelo de clases Java con las tablas de MariaDB automaticamente.
spring.jpa.hibernate.ddl-auto=update
# Define el lenguaje SQL especifico (Dialecto) para MariaDB.
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# Mejora el rendimiento cerrando la sesion de BD inmediatamente tras terminar el Service.
spring.jpa.open-in-view=false

# LOGGING Y TRAZABILIDAD (DEBUG MODE)
# Permite rastrear errores en la validacion de Tokens JWT y filtros de acceso.
logging.level.org.springframework.security=DEBUG
# Muestra las consultas SQL reales que Spring envia a MariaDB en la consola.
logging.level.org.hibernate.SQL=DEBUG
# Muestra los valores exactos (parametros) que se insertan en las consultas SQL.
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE